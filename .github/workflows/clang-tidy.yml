---

name: Clang-Tidy

# Tree-wide gating: runs clang-tidy across every TU in compile_commands.json.
# Re-enabled at the end of the clang flag-day window (PR3).
on:  # yamllint disable-line rule:truthy
  pull_request:
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: true

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-tidy \
            jq \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            libasound2-dev \
            libpulse-dev \
            libaudio-dev \
            libjack-dev \
            libsndio-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libwayland-dev \
            libdecor-0-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev

      - name: Get cmake/ninja
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/tools/vcpkg/vcpkg'
          vcpkgConfigurationJsonGlob: 'vcpkg-configuration.json'
          appendedCacheKey: 'sdl3-v2'

      # Configure with the tool gates ON so tidy sees src/video_tool/ and
      # src/tc_tool/. linux-x64-ci's condition guard requires CI=true.
      - name: Configure
        run: |
          cmake --preset linux-x64-ci \
            -DOPENLIERO_BUILD_TESTS=ON \
            -DOPENLIERO_BUILD_VIDEOTOOL=ON \
            -DOPENLIERO_BUILD_TCTOOL=ON

      # Build the game target so any source files generated mid-build
      # (e.g. via add_custom_command) exist before clang-tidy parses TUs.
      - name: Build (prime generated sources)
        run: cmake --build build/linux-x64-ci --config Release --target game

      - name: Run clang-tidy tree-wide
        run: ./scripts/clang-tidy-all.sh build/linux-x64-ci
